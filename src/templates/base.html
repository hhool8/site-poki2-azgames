<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{TITLE}}</title>
  <meta name="description" content="{{DESCRIPTION}}">
  <meta name="keywords" content="{{KEYWORDS}}">
  <link rel="canonical" href="{{CANONICAL}}">

  <meta property="og:title" content="{{OG_TITLE}}">
  <meta property="og:description" content="{{OG_DESCRIPTION}}">
  <meta property="og:url" content="{{OG_URL}}">
  <meta property="og:type" content="{{OG_TYPE}}">
  <meta property="og:site_name" content="AZ Games">
  <meta property="og:image" content="{{OG_IMAGE}}">

  <meta name="twitter:card" content="{{TWITTER_CARD}}">
  <meta name="twitter:title" content="{{TWITTER_TITLE}}">
  <meta name="twitter:description" content="{{TWITTER_DESCRIPTION}}">
  <meta name="twitter:image" content="{{TWITTER_IMAGE}}">

  {{SCHEMA}}
  <link rel="stylesheet" href="/css/style.css">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
</head>
<body class="{{BODY_CLASS}}">

  <nav class="site-nav" aria-label="Main navigation">
    <a class="logo" href="/"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="26" height="26" aria-hidden="true" style="flex-shrink:0"><rect width="32" height="32" rx="5" fill="#0f0f1a"/><text x="3" y="22" font-family="'Arial Black',Arial,sans-serif" font-weight="900" font-size="14" fill="#f97316">AZ</text></svg>AZ Games</a>
    <div class="nav-cats" id="nav-cats" role="navigation" aria-label="Game categories">
      <a href="/category/clicker-games.html">🖱️ Clicker</a>
      <a href="/category/io-games.html">🌐 IO</a>
      <a href="/category/adventure-games.html">🗺️ Adventure</a>
      <a href="/category/2-player-games.html">👥 2 Player</a>
      <a href="/category/shooting-games.html">🎯 Shooting</a>
      <a href="/category/sports-games.html">🏆 Sports</a>
      <a href="/category/car-games.html">🚗 Car</a>
      <a href="/category/puzzle-games.html">🧩 Puzzle</a>
      <a href="/category/casual-games.html">🎮 Casual</a>
      <a href="/category/kids-games.html">🧒 Kids</a>
      <a href="/blog.html" class="nav-blog">📝 Blog</a>
    </div>
    <button class="nav-toggle" id="nav-toggle" aria-label="Toggle navigation" aria-expanded="false">
      <span></span><span></span><span></span>
    </button>
  </nav>

  <main id="content">
    {{CONTENT}}
  </main>

  <footer class="site-footer" aria-label="Site footer">
    <div class="container">
      <div class="footer-inner">
        <div class="footer-brand">
          <a href="/">AZ Games</a>
        </div>
        <nav class="footer-nav" aria-label="Footer navigation">
          <a href="/about.html">About</a>
          <a href="/privacy.html">Privacy</a>
          <a href="/terms.html">Terms</a>
          <a href="/contact.html">Contact</a>
        </nav>
        <p class="footer-copy">&#169; 2026 AZ Games. All rights reserved.</p>
      </div>
    </div>
  </footer>

  <script>
    (function(){
      var btn = document.getElementById('nav-toggle');
      var cats = document.getElementById('nav-cats');
      if (btn && cats) {
        btn.addEventListener('click', function(){
          var open = cats.classList.toggle('open');
          btn.classList.toggle('open', open);
          btn.setAttribute('aria-expanded', open);
        });
      }
    })();
  </script>
</body>
</html>
