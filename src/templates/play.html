<style>
  body.game-play-page main { padding: 0; overflow: hidden; }
  body.game-play-page .site-footer { display: none; }
  .game-play-wrap {
    display: flex;
    flex-direction: column;
    height: calc(100vh - var(--nav-height));
  }
  .game-play-bar {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    padding: 0 1rem;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    height: 44px;
    flex-shrink: 0;
    overflow: hidden;
  }
  .game-play-title {
    font-weight: 700;
    font-size: .88rem;
    color: #fff;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .game-play-breadcrumb {
    font-size: .79rem;
    color: var(--text-muted);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    flex: 1;
    min-width: 0;
  }
  .game-play-breadcrumb a { color: var(--primary); }
  .game-play-breadcrumb a:hover { text-decoration: none; opacity: .8; }
  .game-play-btn {
    flex-shrink: 0;
    background: rgba(249, 115, 22, 0.1);
    border: 1px solid var(--border-glow);
    color: var(--primary);
    border-radius: 6px;
    padding: 0.22rem 0.65rem;
    font-size: .78rem;
    font-weight: 600;
    cursor: pointer;
    transition: background var(--transition);
    text-decoration: none;
    white-space: nowrap;
  }
  .game-play-btn:hover { background: rgba(249, 115, 22, 0.22); text-decoration: none; }
  .game-play-frame { flex: 1; overflow: hidden; position: relative; }
  .game-play-frame iframe { width: 100%; height: 100%; border: none; display: block; }
  @media (max-width: 520px) { .game-play-title { display: none; } }
  .game-loading-overlay {
    position: absolute; inset: 0;
    background: #0f0f1a;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 1.2rem; z-index: 5;
    transition: opacity 0.3s;
  }
  .game-loading-overlay.hidden { opacity: 0; pointer-events: none; }
  .game-loading-spinner {
    width: 48px; height: 48px;
    border: 4px solid rgba(249, 115, 22, 0.15);
    border-top-color: #f97316;
    border-radius: 50%;
    animation: gamespin 0.8s linear infinite;
  }
  @keyframes gamespin { to { transform: rotate(360deg); } }
  .game-loading-msg { color: #9ca3af; font-size: .88rem; }
  .game-loading-error { color: #f87171; font-size: .88rem; display: none; }
  .game-loading-overlay.error .game-loading-spinner { display: none; }
  .game-loading-overlay.error .game-loading-msg { display: none; }
  .game-loading-overlay.error .game-loading-error { display: block; }
  .game-loading-overlay.error { background: rgba(15,15,26,0.96); }
</style>

<div class="game-play-wrap">
  <div class="game-play-bar">
    <span class="game-play-title">{{GAME_TITLE}}</span>
    <div class="game-play-breadcrumb">
      <a href="/">Home</a> › <a href="/category/{{CATEGORY_SLUG}}.html">{{CATEGORY_NAME}}</a>
    </div>
    <a class="game-play-btn" href="/category/{{CATEGORY_SLUG}}.html">← Back</a>
  </div>
  <div class="game-play-frame">
    <div class="game-loading-overlay" id="gameLoadOverlay">
      <div class="game-loading-spinner"></div>
      <span class="game-loading-msg">Loading game…</span>
      <span class="game-loading-error">Game failed to load. Try opening in a new tab.</span>
      <a class="game-play-btn game-loading-error" href="{{RESOURCE_URL}}" target="_blank" rel="noopener noreferrer" style="margin-top:.5rem">Open in New Tab ↗</a>
    </div>
    <iframe
      id="gameFrame"
      src="{{RESOURCE_URL}}"
      title="{{GAME_TITLE}} — Play Free Online"
      allow="fullscreen *; autoplay *; pointer-lock *"
      allowfullscreen
      loading="eager"
    ></iframe>
  </div>
</div>

<script>
(function(){
  var overlay = document.getElementById('gameLoadOverlay');
  var frame   = document.getElementById('gameFrame');
  if (!overlay || !frame) return;
  var timer = setTimeout(function(){
    overlay.classList.add('error');
  }, 12000);
  frame.addEventListener('load', function(){
    clearTimeout(timer);
    overlay.classList.add('hidden');
  });
})();
</script>
